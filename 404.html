<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>NexZone — Page Not Found</title>
<link rel="canonical" href="https://sulavshrestha1.github.io/">
<script>
// GitHub Pages SPA redirect — preserves hash if present
(function() {
  var hash = window.location.hash;
  var target = '/' + (hash ? hash : '');
  window.location.replace(target);
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0c;color:#f0eff5;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;text-align:center;padding:24px}
.icon{font-size:64px;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:28px;font-weight:700}
p{color:#6b7080;font-size:16px;max-width:400px;line-height:1.6}
a{color:#e8323c;text-decoration:underline}
</style>
</head>
<body>
<div class="icon">🔄</div>
<h1>Redirecting to NexZone...</h1>
<p>If you're not redirected automatically, <a href="/">click here to go home</a>.</p>
</body>
</html>
